[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --rootdir=tests
pythonpath = .
markers =
    mcp: MCP protocol tests
    config: Configuration tests
    server: Server endpoint tests
    tools: MCP tools tests
    stdio: stdio transport tests
    slow: Slow-running tests
asyncio_mode = auto
